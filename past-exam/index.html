<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Past Exams — Solved</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../assets/css/styles.css">
<script>(function(){const s=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',s);})();</script>
</head>
<body class="max-w-5xl mx-auto px-4 pb-20">

<header class="flex items-center justify-between py-4 border-b border-slate-200 dark:border-slate-700 no-print">
  <a href="../index.html" class="text-sm">← Back to index</a>
  <button id="themeToggle" class="text-sm border rounded px-2 py-1">🌓 Theme</button>
</header>

<main>
  <h1 class="text-3xl font-extrabold mt-4 mb-2">Past Exams — Fully Solved</h1>
  <p class="text-slate-500 dark:text-slate-400 mb-6">Every real exam Dr. ElSayed has given since 2018, with side-by-side solutions and "how to recognise" tips.</p>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="exams"></div>

  <footer class="mt-12 pt-6 border-t text-sm text-slate-500 dark:text-slate-400">
    Educational use only. All exam PDFs © Dr. Khaled M. ElSayed / Zewail City.
  </footer>
</main>

<script>
const EXAMS = [
  { href:'2025.html',       year:'2025', title:'Spring 2025 — Midterm &amp; Final', notes:'13 questions · 1 set' },
  { href:'2024-final.html', year:'2024', title:'2024 Final — SC &amp; Credit',     notes:'Two versions · official solutions' },
  { href:'2024-mid.html',   year:'2024', title:'2024 Midterm',                     notes:'Solution-only PDF — questions reconstructed' },
  { href:'2023-final.html', year:'2023', title:'2023 Final — SC &amp; Credit',     notes:'Two versions · official answers' },
  { href:'2023-mid.html',   year:'2023', title:'2023 Midterm',                     notes:'Questions + official answers' },
  { href:'2022-final.html', year:'2022', title:'2022 Final — SC &amp; Credit',     notes:'Two versions · official answers' },
  { href:'2021-exam.html',  year:'2021', title:'2021 Midterm &amp; Final',         notes:'Combined paper · official answers' },
  { href:'2020-final.html', year:'2020', title:'2020 Final — Versions 1 &amp; 2',  notes:'Two versions · answers for V1' },
  { href:'2019-final.html', year:'2019', title:'2019 Final — SC &amp; CS',         notes:'Two versions · official answers (SC)' },
  { href:'2019-mid.html',   year:'2019', title:'2019 Midterm',                     notes:'Questions only — solutions written here' },
  { href:'2018-final.html', year:'2018', title:'2018 Final',                       notes:'Questions only — solutions written here' },
  { href:'2018-mid.html',   year:'2018', title:'2018 Midterm',                     notes:'Questions only — solutions written here' },
];

document.getElementById('exams').innerHTML = EXAMS.map(e => `
  <a href="${e.href}" class="toc-card">
    <div class="flex items-center justify-between">
      <h3>${e.title}</h3>
      <span class="text-xs px-2 py-0.5 rounded bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200">${e.year}</span>
    </div>
    <p class="text-sm opacity-75 mt-1">${e.notes}</p>
  </a>
`).join('');

document.getElementById('themeToggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
});
</script>
</body>
</html>
